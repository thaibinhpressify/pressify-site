services:
  app-prod:
    build:
      context: .
      target: prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NUXT_PUBLIC_PRESSIFY_API_BASE_URL: ${NUXT_PUBLIC_PRESSIFY_API_BASE_URL:-http://localhost:8000}
      NUXT_PUBLIC_PRESSIFY_API_BASE: ${NUXT_PUBLIC_PRESSIFY_API_BASE_URL:-http://localhost:8000}
      PRESSIFY_API_BASE: ${NUXT_PUBLIC_PRESSIFY_API_BASE_URL:-http://localhost:8000}
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    depends_on:
      - app-prod
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  app_node_modules:
