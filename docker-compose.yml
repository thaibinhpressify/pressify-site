services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 3000
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

  app-prod:
    profiles:
      - prod
    build:
      context: .
      target: prod
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000

volumes:
  app_node_modules:

